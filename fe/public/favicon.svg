<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <!-- Subtle back-glow outline for tab accessibility on black/white tabs -->
  <circle cx="24" cy="24" r="22" fill="#090D15" stroke="#10B981" stroke-width="1" opacity="0.2"/>

  <!-- Back Cover / housing for roll -->
  <!-- Base box forming the main chassis slope -->
  <path d="M 12 10 
           A 12 12 0 0 1 36 10 
           L 40 18 
           L 40 38 
           C 40 40 38 42 36 42 
           L 12 42 
           C 10 42 8 40 8 38 
           L 8 18 
           Z" fill="#1E293B"/>

  <!-- Lid cover (Top accent section highlight) -->
  <path d="M 12 10 A 12 12 0 0 1 36 10 L 38 18 L 10 18 Z" fill="#334155"/>

  <!-- Lid/Cover panel separating body -->
  <path d="M 8 18 L 40 18 L 40 38 C 40 40 38 42 36 42 L 12 42 C 10 42 8 40 8 38 Z" fill="#0F172A"/>

  <!-- Accent Seam Line (Glowing gap) -->
  <line x1="8" y1="18" x2="40" y2="18" stroke="#10B981" stroke-width="1"/>

  <!-- Dispenser Paper Feed Slot -->
  <!-- Slightly curved downwards or just flat gap -->
  <rect x="14" y="24" width="20" height="2" rx="1" fill="#020617"/>

  <!-- The Actual Label Paper draping down onwards -->
  <path d="M 16 25 
           L 32 25 
           L 32 44 
           A 2 2 0 0 1 30 46 
           L 18 46 
           A 2 2 0 0 1 16 44 
           Z" fill="#F8FAFC" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.4))"/>

  <!-- Abstract Printing / Artwork on label (QR and Barcode styles) -->
  <!-- Micro QR module block right item -->
  <rect x="25" y="29" width="5" height="5" rx="1" fill="#1E293B"/>
  <rect x="26.5" y="30.5" width="2" height="2" fill="#10B981"/>

  <!-- Micro Barcode lines left side -->
  <line x1="18" y1="30" x2="23" y2="30" stroke="#1E293B" stroke-width="1"/>
  <line x1="18" y1="32" x2="22" y2="32" stroke="#1E293B" stroke-width="1"/>
  <line x1="18" y1="34" x2="24" y2="34" stroke="#1E293B" stroke-width="1"/>
  <line x1="18" y1="36" x2="21" y2="36" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Power LED Indicator glowing emerald on the body lid -->
  <circle cx="24" cy="14" r="2" fill="#10B981"/>
  <circle cx="24" cy="14" r="1.2" fill="#F0FDF4"/>

  <!-- Bottom shadow gradient base accent to ground it in view -->
  <ellipse cx="24" cy="43" rx="14" ry="1.5" fill="#000000" opacity="0.4"/>
</svg>