
services:
  # 1. Backend Service (also serves built Frontend statically by default)
  label-station:
    build: .
    container_name: label-station-backend
    ports:
      - "8080:8080"
    environment:
      # Defaults for environment variables.
      # Change these according to your printer setup.
      - BROTHER_QL_MODEL=${BROTHER_QL_MODEL:-QL-800}
      - BROTHER_QL_BACKEND=${BROTHER_QL_BACKEND:-network}
      
      # NOTE: For `network` backend, inside the Docker container, `127.0.0.1` 
      # won't map to the host machine. Instead use `host.docker.internal` 
      # or specify the actual local IP address (e.g., 192.168.1.100).
      - BROTHER_QL_PRINTER=${BROTHER_QL_PRINTER:-host.docker.internal}
      
      # The Go server listens on 8080 by default.
      - PORT=8080
    restart: unless-stopped

  # 2. Frontend Production-ready Service (Served via Nginx)
  # Built static files served from Nginx which proxies /api requests.
  label-station-fe:
    build:
      context: ./fe
    container_name: label-station-frontend
    ports:
      - "8081:80"
    depends_on:
      - label-station
    restart: unless-stopped


